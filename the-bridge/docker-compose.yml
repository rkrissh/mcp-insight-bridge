version: '3.8'

services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: bridge-opensearch
    environment:
      - cluster.name=bridge-cluster
      - node.name=bridge-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - bridge-network

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: bridge-dashboards
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - bridge-network

  opa:
    image: openpolicyagent/opa:latest-static
    container_name: bridge-opa
    ports:
      - "8181:8181"
    command:
      - "run"
      - "--server"
      - "--log-level=debug"
      - "/policies"
    volumes:
      - ./policies:/policies
    networks:
      - bridge-network

  bridge-proxy:
    build: .
    container_name: bridge-proxy
    command: uvicorn bridge:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - opensearch
      - opa
    volumes:
      - .:/app
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SPLUNK_HEC_URL=http://splunk:8088/services/collector
      - OPA_URL=http://opa:8181/v1/data/the_bridge/authz/allow
    networks:
      - bridge-network

  bridge-log-scraper:
    build: .
    container_name: bridge-log-scraper
    command: python log_scraper.py
    depends_on:
      - opensearch
    volumes:
      - .:/app
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
    networks:
      - bridge-network

  bridge-dashboard:
    build: .
    container_name: bridge-dashboard
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - bridge-proxy
    volumes:
      - .:/app
    networks:
      - bridge-network

networks:
  bridge-network:
    driver: bridge
